<h1>Create User</h1>

<form #userForm="ngForm" (ngSubmit)="createUser(userForm)">
  <!-- Person ID is required: it must reference an existing person document -->
  <input name="fk_person" [(ngModel)]="fk_person" placeholder="Person ID (required)" />

  <input name="username" [(ngModel)]="username" placeholder="Username" required />

  <input name="email" [(ngModel)]="email" placeholder="Email" required />

  <input name="password" [(ngModel)]="password" type="password" placeholder="Password" required />

  <select name="role" [(ngModel)]="role">
    <option [value]="1">Admin</option>
    <option [value]="2">User</option>
  </select>

  <button type="submit">Create User</button>
</form>
