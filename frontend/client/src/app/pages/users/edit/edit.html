<h1>Edit User</h1>

<p *ngIf="loading()">Cargando usuario...</p>
<p *ngIf="loadError()">{{ loadError() }}</p>

<form *ngIf="!loading() && !loadError()" #userForm="ngForm" (ngSubmit)="updateUser(userForm)">
  <input
    name="fk_person"
    [(ngModel)]="user.fk_person"
    required
    placeholder="Person ID (required)"
    readonly
    #fkPerson="ngModel"
  />
  <div *ngIf="fkPerson.touched && fkPerson.invalid">
    <small *ngIf="fkPerson.errors?.['required']">Person ID is required</small>
  </div>

  <input
    name="username"
    [(ngModel)]="user.username"
    required
    minlength="3"
    maxlength="30"
    placeholder="Username"
    #username="ngModel"
  />
  <div *ngIf="username.touched && username.invalid">
    <small *ngIf="username.errors?.['required']">Username is required</small>
    <small *ngIf="username.errors?.['minlength']">Username must have at least 3 characters</small>
    <small *ngIf="username.errors?.['maxlength']">Username max length is 30 characters</small>
  </div>

  <input
    name="email"
    [(ngModel)]="user.email"
    required
    email
    placeholder="Email"
    #email="ngModel"
  />
  <div *ngIf="email.touched && email.invalid">
    <small *ngIf="email.errors?.['required']">Email is required</small>
    <small *ngIf="email.errors?.['email']">Email is not valid</small>
  </div>

  <input
    name="password"
    [(ngModel)]="user.password"
    type="password"
    minlength="6"
    placeholder="New password (optional)"
    #password="ngModel"
  />
  <div *ngIf="password.touched && password.invalid">
    <small *ngIf="password.errors?.['minlength']">Password must have at least 6 characters</small>
  </div>

  <select name="role" [(ngModel)]="user.role">
    <option [ngValue]="1">Admin</option>
    <option [ngValue]="2">User</option>
  </select>

  <button type="submit" [disabled]="userForm.invalid">Guardar cambios</button>
</form>

<p *ngIf="updateError()">{{ updateError() }}</p>

<p>
  <a [routerLink]="['/users']">Volver a usuarios</a>
</p>
