<div class="people-card">
  <h1>List of all people registered on the site</h1>

  <ul class="people-list">
    <li *ngFor="let person of people">
      <span class="person-name"> {{ person.name_01 }} {{ person.surname_01 }} </span>

      <a *ngIf="isAdmin" [routerLink]="['/people', person._id, 'edit']" class="edit-btn">Edit</a>
      <button *ngIf="isAdmin" class="delete-btn" (click)="delete.emit(person._id)">Delete</button>
    </li>
  </ul>
</div>
