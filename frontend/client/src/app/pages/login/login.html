<h1>Login</h1>

<form #loginForm="ngForm" (ngSubmit)="submitLogin(loginForm)">
  <h2>Login as User</h2>

  <input name="username" [(ngModel)]="username" required placeholder="Username" />

  <input name="password" [(ngModel)]="password" type="password" required placeholder="Password" />

  <button type="submit" matButton="outlined">Login</button>
</form>

<div class="logout-container">
  <button class="logout-btn" *ngIf="isLoggedIn" (click)="logout()">Logout</button>
</div>
