<mat-toolbar class="topbar">
  <a class="brand" routerLink="/">APPGRUPAL</a>

  <nav class="nav-links" *ngIf="isAuthenticated">
    <a mat-button routerLink="/people" routerLinkActive="active-link" *ngIf="isAdmin">People</a>
    <a mat-button routerLink="/users" routerLinkActive="active-link" *ngIf="isAdmin">Users</a>
    <a mat-button routerLink="/organizations" routerLinkActive="active-link" *ngIf="isAdmin">
      Organizations
    </a>
    <a mat-button routerLink="/modalities" routerLinkActive="active-link">Modalities</a>
    <a mat-button routerLink="/profile" routerLinkActive="active-link">Profile</a>
  </nav>

  <span class="spacer"></span>

  <button mat-stroked-button routerLink="/login" *ngIf="!isAuthenticated">Login</button>
  <button mat-flat-button class="delete-btn" *ngIf="isAuthenticated" (click)="logout()">
    Logout
  </button>
</mat-toolbar>

<main class="page-shell">
  <router-outlet></router-outlet>
</main>
